<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Funcionários</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="cabecalho">
      <h1>Dashboard de Funcionários</h1>
    </header>

    <div class="indicador-tela">
      <span class="badge"></span>
    </div>
    <div class="container">
      <div class="coluna coluna-esquerda">
        <div class="card">
          <img
            class="foto foto-trump"
            src="fotos/trump.jpg"
            alt="Foto de Donald Trump"
          />
          <div class="card-info">
            <h3>Donald Trump</h3>
            <p>EUA</p>
          </div>
          <span class="cargo">Liderança</span>
        </div>
        <div class="card">
          <img
            class="foto"
            src="fotos/whind.jpg"
            alt="Foto de Whindersson Nunes"
          />
          <div class="card-info">
            <h3>Whindinho</h3>
            <p>MENINO DA COMEDIA</p>
          </div>
          <span class="cargo">Criativo</span>
        </div>
      </div>
      <div class="coluna coluna-direita">
        <div class="card">
          <img class="foto" src="fotos/gates.jpg" alt="Foto de Bill Gates" />
          <div class="card-info">
            <h3>Bill Gates</h3>
            <p>MICROSOFT</p>
          </div>
          <span class="cargo">Tecnologia</span>
        </div>
        <div class="card">
          <img
            class="foto"
            src="fotos/mark.jpg"
            alt="Foto de Mark Zuckerberg"
          />
          <div class="card-info">
            <h3>Mark Zuckerberg</h3>
            <p>FACEBOOK</p>
          </div>
          <span class="cargo">Engenharia</span>
        </div>
      </div>
    </div>
    <footer>easter egg</footer>
  </body>
</html>
